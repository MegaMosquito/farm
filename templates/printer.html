<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <title>{{ printer.name }}</title>
  <style>
    body {
      font-family: sans-serif;
      background: #121212;
      color: white;
      margin: 0;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .back-btn {
      text-decoration: none;
      color: #888888;
      font-weight: bold;
    }
    .cam-grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 20px; 
      margin-bottom: 30px;
    }

    /* The container that forces a 16:9 shape */
    .stream-container {
      position: relative;
      width: 100%;
      padding-top: 75.00%;
      background: #000;
      border: 2px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }
    .stream-container:hover {
      transform: translateY(-5px);
      border-color: #007bff;
    }
    .stream-container iframe, .stream-container img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      object-fit: contain;
      cursor: pointer;
      pointer-events: auto;
    }
    .controls { 
      display: flex;
      width: 90%;
      gap; 20px;
      margin: 0 auto;
      justify-content: left;
      text-align: left; 
      padding: 10px; 
      background: #333333; 
      border-radius: 12px;
    }
    .control-item {
      flex: 1;
      padding: 15px;
      border: none;
      text-align: left;
    }
    .control-btn {
      background: #07c1ff;
      width: 100%;
      border: none;
      padding: 10px 10px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .control-btn:hover {
      transform: translateY(-3px);
    }
    .control-btn:active { transform: scale(0.95); }
    .light-btn {
      width: 100%;
      background: #ffc107;
      border: none;
      padding: 10px 10px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .light-btn:hover {
      transform: translateY(-3px);
      border-color: #007bff;
    }
    .light-btn:active { transform: scale(0.95); }
  </style>
  <script>
    var is_on = false
    function initialize() {
      var xhttpr = new XMLHttpRequest()
      xhttpr.open('POST', "http://192.168.123.82:7777/neopixel/v1/init/21/24")
      xhttpr.setRequestHeader('Content-Type', 'text/html; charset=utf-8')
      xhttpr.send()
    }
    function control() {
      console.log("control");
      window.location.href = "{{ printer.control_url }}";
    }
    function toggle() {
      is_on = !is_on;
      xhttpr = new XMLHttpRequest()
      if ( is_on ) {
        xhttpr.open('POST', "http://192.168.123.82:7777/neopixel/v1/all/255/255/255")
      } else {
        xhttpr.open('POST', "http://192.168.123.82:7777/neopixel/v1/all/0/0/0")
      }
      xhttpr.setRequestHeader('Content-Type', 'text/html; charset=utf-8')
      xhttpr.send()
    }
    window.addEventListener("DOMContentLoaded", function() {
      initialize();
      const btn_control = document.getElementById("control");
      btn_control.addEventListener("click", control);
      const btn_toggle = document.getElementById("toggle");
      btn_toggle.addEventListener("click", toggle);
    });
  </script>
</head>
<body>
  <div class="header">
    <a href="/" class="back-btn">◀️  PRINTERS</a>
    <h1>{{ printer.name }}</h1>
    <div style="width: 100px;"></div> <!-- Spacer for centering -->
  </div>
  <div class="cam-grid">
    <div class="stream-container">
      <a href="{{ printer.cam_url_1 }}">
        <img src="{{ printer.cam_url_1 }}" onerror="this.outerHTML='<iframe src=\'{{ printer.cam_url_1 }}\'></iframe>'">
      </a>
    </div>
    <div class="stream-container">
      <a href="{{ printer.cam_url_2 }}">
        <img src="{{ printer.cam_url_2 }}" onerror="this.outerHTML='<iframe src=\'{{ printer.cam_url_1 }}\'></iframe>'">
      </a>
    </div>
  </div>
  <div class="controls">
    <div class="control-item">
      <button type="submit" class="control-btn" id="control">▶️  CONTROL</button>
    </div>
    <div class="control-item">
      <button type="submit" class="light-btn" id="toggle">💡 LIGHT</button>
    </div>
  </div>
</body>
</html>
